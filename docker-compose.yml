services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: habitflow
      POSTGRES_USER: habitflow
      POSTGRES_PASSWORD: habitflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  #  Realm — это изолированное пространство. Как отдельная база пользователей. master — для самого Keycloak. habitflow — для твоего приложения.
  #  Client — это приложение которое доверяет Keycloak. Ты говоришь Keycloak: "есть приложение habitflow-backend, оно будет приходить ко мне за токенами".
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/habitflow
      KC_DB_USERNAME: habitflow
      KC_DB_PASSWORD: habitflow
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  app:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/habitflow
      SPRING_DATASOURCE_USERNAME: habitflow
      SPRING_DATASOURCE_PASSWORD: habitflow
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/habitflow
    depends_on:
      - postgres
      - keycloak

  vault-init:
    image: hashicorp/vault:latest
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: myroot
    command: >
      sh -c "sleep 5 &&
      vault secrets enable -path=habitflow kv &&
      vault kv put habitflow/habitflow-backend spring.datasource.password=habitflow"
    depends_on:
      - vault

  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      SKIP_SETCAP: true
    cap_add:
      - IPC_LOCK

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  vault_data:
